<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商绩效考核滚动分析</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
if (typeof XLSX === 'undefined') {
  document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --primary: #4f6ef7;
  --primary-light: #eef1ff;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--gray-50); color: var(--gray-900); line-height: 1.6; }

.header { background: linear-gradient(135deg, #4f6ef7 0%, #7c3aed 100%); color: #fff; padding: 28px 40px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(79,110,247,.3); }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: .5px; }
.header p { font-size: 13px; opacity: .85; margin-top: 4px; }

.container { max-width: 1800px; margin: 0 auto; padding: 24px; }

/* Upload Area */
.upload-section { background: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
.upload-area { border: 2px dashed var(--gray-300); border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
.upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: var(--primary-light); }
.upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 36px; margin-bottom: 8px; }
.upload-text { font-size: 15px; color: var(--gray-700); }
.upload-hint { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

.months-bar { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.month-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--primary-light); color: var(--primary); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: grab; transition: all .2s; user-select: none; position: relative; }
.month-tag:active { cursor: grabbing; }
.month-tag.dragging { opacity: 0.4; transform: scale(0.95); }
.month-tag.drag-over-left { box-shadow: -3px 0 0 0 var(--primary); }
.month-tag.drag-over-right { box-shadow: 3px 0 0 0 var(--primary); }
.month-tag .drag-handle { opacity: .4; font-size: 11px; margin-right: 2px; }
.month-tag .remove-btn { cursor: pointer; opacity: .5; font-size: 16px; line-height: 1; }
.month-tag .remove-btn:hover { opacity: 1; }

/* Tabs */
.tabs { display: flex; gap: 2px; background: var(--gray-200); border-radius: 10px; padding: 3px; margin-bottom: 24px; width: fit-content; }
.tab { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--gray-500); transition: all .2s; border: none; background: none; }
.tab.active { background: #fff; color: var(--primary); box-shadow: var(--shadow); }
.tab:hover:not(.active) { color: var(--gray-700); }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Cards */
.card { background: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 6px; height: 20px; border-radius: 3px; background: var(--primary); }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.stat-label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-change { font-size: 12px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.stat-change.up { color: var(--success); }
.stat-change.down { color: var(--danger); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--gray-100); padding: 8px 10px; text-align: center; font-weight: 600; color: var(--gray-700); white-space: nowrap; border-bottom: 2px solid var(--gray-200); position: sticky; z-index: 2; }
thead tr:first-child th { top: 0; }
thead tr:nth-child(2) th { top: 36px; }
thead th.group-a { background: #dbeafe; color: #1e40af; border-bottom: 1px solid #93c5fd; }
thead th.group-b { background: #fef3c7; color: #92400e; border-bottom: 1px solid #fcd34d; }
thead th.group-c { background: #d1fae5; color: #065f46; border-bottom: 1px solid #6ee7b7; }
thead th.group-d { background: #ede9fe; color: #5b21b6; border-bottom: 1px solid #c4b5fd; }
thead th.sub-a { background: #eff6ff; color: #1e40af; font-size: 11px; }
thead th.sub-b { background: #fffbeb; color: #92400e; font-size: 11px; }
thead th.sub-c { background: #ecfdf5; color: #065f46; font-size: 11px; }
thead th.sub-d { background: #f5f3ff; color: #5b21b6; font-size: 11px; }
thead th.group-exception { background: #fff1f2; color: #be123c; border-bottom: 1px solid #fda4af; }
thead th.sub-exception { background: #fff1f2; color: #be123c; font-size: 11px; }
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); white-space: nowrap; }
tbody tr:hover { background: var(--primary-light); }
.grade-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.grade-A { background: #dcfce7; color: #16a34a; }
.grade-B { background: #dbeafe; color: #2563eb; }
.grade-C { background: #fef3c7; color: #d97706; }
.grade-D { background: #fee2e2; color: #dc2626; }

.trend-up { color: var(--success); font-weight: 600; }
.trend-down { color: var(--danger); font-weight: 600; }
.trend-flat { color: var(--gray-500); }

/* Chart */
.chart-container { width: 100%; height: 420px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }

/* Analysis Detail */
.analysis-row { padding: 16px; border: 1px solid var(--gray-200); border-radius: 10px; margin-bottom: 12px; }
.analysis-row:hover { border-color: var(--primary); }
.analysis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.analysis-name { font-weight: 600; font-size: 15px; }
.analysis-badges { display: flex; gap: 6px; }
.analysis-body { font-size: 13px; color: var(--gray-700); }
.analysis-body .reason { background: #fffbeb; padding: 8px 12px; border-radius: 6px; margin-top: 8px; border-left: 3px solid var(--warning); }
.analysis-dims { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
.dim-item { font-size: 12px; color: var(--gray-500); }
.dim-item span { font-weight: 600; color: var(--gray-900); }

/* Filters */
.filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 13px; outline: none; }
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }

/* Export Button */
.btn { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #3d5be5; }
.btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-group { display: flex; gap: 8px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Mini sparkline in table */
.sparkline-cell { min-width: 100px; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 20px; }
  .container { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Loading overlay */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.8); display: flex; align-items: center; justify-content: center; z-index: 999; }
.loading-overlay.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; color: #fff; font-size: 14px; z-index: 1000; transform: translateX(120%); transition: transform .3s ease; }
.notification.show { transform: translateX(0); }
.notification.success { background: var(--success); }
.notification.error { background: var(--danger); }

/* Multi-select Dropdown */
.multi-select-dropdown { position: relative; display: inline-block; min-width: 260px; max-width: 400px; }
.multi-select-trigger { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: var(--gray-700); transition: all .2s; user-select: none; }
.multi-select-trigger:hover { border-color: var(--primary); }
.multi-select-trigger.open { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.multi-select-trigger .arrow { font-size: 10px; color: var(--gray-500); transition: transform .2s; margin-left: 8px; }
.multi-select-trigger.open .arrow { transform: rotate(180deg); }
.multi-select-dropdown-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 200; min-width: 100%; max-height: 360px; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: var(--shadow-md); overflow: hidden; flex-direction: column; }
.multi-select-dropdown-panel.open { display: flex; }
.multi-select-search { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); }
.multi-select-search input { width: 100%; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: 6px; font-size: 12px; outline: none; }
.multi-select-search input:focus { border-color: var(--primary); }
.multi-select-actions { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid var(--gray-100); }
.multi-select-actions .toggle-all-btn { font-size: 12px; color: var(--primary); cursor: pointer; font-weight: 500; background: none; border: none; padding: 2px 6px; border-radius: 4px; }
.multi-select-actions .toggle-all-btn:hover { background: var(--primary-light); }
.multi-select-actions .selected-count { font-size: 11px; color: var(--gray-500); }
.multi-select-list { overflow-y: auto; max-height: 260px; padding: 4px 0; }
.multi-select-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background .15s; }
.multi-select-item:hover { background: var(--primary-light); }
.multi-select-item input[type="checkbox"] { accent-color: var(--primary); cursor: pointer; margin: 0; }
.multi-select-item label { cursor: pointer; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; font-weight: normal; }
.multi-select-empty { padding: 20px; text-align: center; color: var(--gray-500); font-size: 12px; }

/* Supplier Pool */
.pool-stats { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.pool-stat-item { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-light); border-radius: 8px; font-size: 13px; }
.pool-stat-item .pool-stat-value { font-weight: 700; color: var(--primary); font-size: 18px; }
.pool-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.supplier-pool-table { width: 100%; }
.supplier-pool-table th { background: var(--gray-100); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--gray-700); border-bottom: 2px solid var(--gray-200); }
.supplier-pool-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); }
.supplier-pool-table tr:hover { background: var(--primary-light); }
.pool-action-btn { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--gray-300); background: #fff; color: var(--gray-700); transition: all .15s; }
.pool-action-btn:hover { border-color: var(--primary); color: var(--primary); }
.pool-action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

/* Meeting notes textarea in rank table */
.meeting-notes-textarea {
  width: 100%; min-width: 140px; min-height: 36px; max-height: 80px;
  padding: 4px 8px; border: 1px solid var(--gray-300); border-radius: 6px;
  font-size: 12px; outline: none; resize: vertical; font-family: inherit; line-height: 1.4;
}
.meeting-notes-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,110,247,.1); }

/* Scoring Table */
.scoring-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.scoring-table th { background: var(--gray-100); padding: 10px 8px; text-align: center; font-weight: 600; color: var(--gray-700); border-bottom: 2px solid var(--gray-200); white-space: nowrap; position: sticky; top: 0; z-index: 1; }
.scoring-table td { padding: 6px 8px; border-bottom: 1px solid var(--gray-100); text-align: center; }
.scoring-table tbody tr:hover { background: var(--primary-light); }
.scoring-table .supplier-name-cell { text-align: left; font-weight: 500; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scoring-table .category-cell { text-align: left; color: var(--gray-500); font-size: 12px; }
.scoring-input { width: 60px; padding: 4px 6px; border: 1px solid var(--gray-300); border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
.scoring-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,110,247,.1); }
.scoring-input.out-of-range { border-color: var(--danger); background: #fef2f2; }
.scoring-total { font-weight: 700; font-size: 14px; color: var(--gray-900); }
.scoring-conclusion-input { width: 100%; min-width: 120px; padding: 4px 8px; border: 1px solid var(--gray-300); border-radius: 6px; font-size: 12px; outline: none; }
.scoring-conclusion-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,110,247,.1); }
.scoring-max-hint { font-size: 10px; color: var(--gray-500); display: block; margin-top: 2px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: var(--radius); padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.modal-form-group { margin-bottom: 16px; }
.modal-form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 6px; }
.modal-form-group input, .modal-form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 13px; outline: none; }
.modal-form-group input:focus, .modal-form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Disabled supplier styles */
.supplier-disabled { opacity: 0.5; }
.supplier-disabled td { text-decoration: line-through; color: var(--gray-500) !important; }
.supplier-disabled td:last-child { text-decoration: none; }
.pool-action-btn.disable-btn { border-color: var(--warning); color: var(--warning); }
.pool-action-btn.enable-btn { border-color: var(--success); color: var(--success); }

/* Status badges */
.status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; }
.status-draft { background: #fef3c7; color: #d97706; }
.status-locked { background: #dcfce7; color: #16a34a; }

/* Scoring submit area */
.scoring-submit-area { display: flex; gap: 8px; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--gray-200); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.scoring-input:read-only { background: var(--gray-100); cursor: not-allowed; }
.scoring-conclusion-input:read-only { background: var(--gray-100); cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 供应商绩效考核 · 滚动分析平台</h1>
  <p id="headerInfo">已加载 0 个月份数据 · 0 家供应商</p>
</div>

<div class="container">
  <!-- Upload Section -->
  <div class="upload-section">
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
      <div class="upload-icon">📁</div>
      <div class="upload-text">点击或拖拽上传新的月度考核明细 Excel 文件</div>
      <div class="upload-hint">支持 .xlsx / .xls 格式，系统将自动解析并纳入对比分析</div>
    </div>
    <div class="months-bar" id="monthsBar"></div>
  </div>

  <!-- Stats -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <label style="font-weight:600;font-size:14px;">统计月份：</label>
    <select id="statsMonth" style="padding:6px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none;"></select>
  </div>
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="overview">📈 总览趋势</button>
    <button class="tab" data-tab="compare">📊 维度对比</button>
    <button class="tab" data-tab="rank">🏆 排名变动与差异分析</button>
    <button class="tab" data-tab="detail">📋 明细数据</button>
    <button class="tab" data-tab="pool">📦 供应商池</button>
    <button class="tab" data-tab="scoring">✍️ 手动打分</button>
  </div>

  <!-- Panel: Overview -->
  <div class="panel active" id="panel-overview">
    <div class="card">
      <div class="card-title"><div class="icon"></div>供应商绩效趋势</div>
      <div class="filter-bar" style="align-items:flex-start;">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <label style="font-weight:600;font-size:13px;white-space:nowrap;">类别：</label>
            <div class="multi-select-dropdown" id="trendCategoryDropdown">
              <div class="multi-select-trigger" id="trendCategoryTrigger" onclick="toggleTrendCatDropdown()">
                <span id="trendCategoryDisplay">全部类别</span>
                <span class="arrow">▼</span>
              </div>
              <div class="multi-select-dropdown-panel" id="trendCategoryPanel">
                <div class="multi-select-actions">
                  <button class="toggle-all-btn" onclick="toggleAllTrendCats()">全选/取消全选</button>
                  <span class="selected-count" id="trendCatCount">已选 0 个</span>
                </div>
                <div class="multi-select-list" id="trendCategoryList"></div>
              </div>
            </div>
            <label style="font-weight:600;font-size:13px;white-space:nowrap;margin-left:8px;">指标：</label>
            <div class="multi-select-dropdown" id="trendMetricDropdown">
              <div class="multi-select-trigger" id="trendMetricTrigger" onclick="toggleTrendMetricDropdown()">
                <span id="trendMetricDisplay">总分</span>
                <span class="arrow">▼</span>
              </div>
              <div class="multi-select-dropdown-panel" id="trendMetricPanel">
                <div class="multi-select-actions">
                  <button class="toggle-all-btn" onclick="toggleAllTrendMetrics()">全选/取消全选</button>
                  <span class="selected-count" id="trendMetricCount">已选 0 个</span>
                </div>
                <div class="multi-select-list" id="trendMetricList">
                  <div class="multi-select-item" onclick="toggleTrendMetricItem(this,'total')"><input type="checkbox" checked tabindex="-1"><label>总分</label></div>
                  <div class="multi-select-item" onclick="toggleTrendMetricItem(this,'A')"><input type="checkbox" tabindex="-1"><label>品质考核</label></div>
                  <div class="multi-select-item" onclick="toggleTrendMetricItem(this,'B')"><input type="checkbox" tabindex="-1"><label>成本考核</label></div>
                  <div class="multi-select-item" onclick="toggleTrendMetricItem(this,'C')"><input type="checkbox" tabindex="-1"><label>交货考核</label></div>
                  <div class="multi-select-item" onclick="toggleTrendMetricItem(this,'D')"><input type="checkbox" tabindex="-1"><label>服务考核</label></div>
                </div>
              </div>
            </div>
            <label style="font-weight:600;font-size:13px;white-space:nowrap;margin-left:8px;">月份：</label>
            <div class="multi-select-dropdown" id="trendMonthDropdown">
              <div class="multi-select-trigger" id="trendMonthTrigger" onclick="toggleTrendMonthDropdown()">
                <span id="trendMonthDisplay">全部月份</span>

<script>
// ========== Global State ==========
const STATE = {
  months: [],       // [{name: '3月', data: [{name, category, total, grade, A, B, C, D, ...}]}]
  monthNames: [],   // ['3月', '4月', '5月']
};

// Meeting notes cache for rank table: key = `${supplierName}_${monthPair}`, value = text
const meetingNotesCache = {};

// Column mapping for parsing monthly Excel
// Based on the data structure: row 5+ is data
// Cols: 0=序号, 1=供应商名称, 2=类别, 3=总分, 4=等级
// A细分: 5=a1, 6=a2, 7=a3, 8=a4, 9=A总分
// B细分: 10=b1, 11=b2, 12=b3, 13=b4, 14=b5, 15=B总分
// C细分: 16=c1, 17=c2, 18=c3, 19=C总分
// D细分: 20=d1a, 21=d1b, 22=d2a, 23=d2b, 24=d2c, 25=d2d(可能存在), 26=D总分
// 27=会议结论

function parseMonthExcel(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      
      // Find data start row (skip header rows 0-3)
      let dataStart = 0;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row[1] && typeof row[1] === 'string' && row[1].includes('公司') || 
            row[1] && typeof row[1] === 'string' && row[1].includes('有限') ||
            row[1] && typeof row[1] === 'string' && row[1].includes('刷') ||
            row[1] && typeof row[1] === 'string' && row[1].includes('实业') ||
            row[1] && typeof row[1] === 'string' && row[1].includes('工艺') ||
            row[1] && typeof row[1] === 'string' && row[1].includes('包装') ||
            row[1] && typeof row[1] === 'string' && row[1].includes('展示') ||
            (row[0] && !isNaN(parseInt(row[0])) && row[1])) {
          dataStart = i;
          break;
        }
      }
      
      const suppliers = [];
      for (let i = dataStart; i < rows.length; i++) {
        const row = rows[i];
        if (!row[1] || typeof row[1] !== 'string' || row[1].trim() === '') continue;
        
        const name = String(row[1]).trim();
        if (name === '供应商名称') continue;
        
        const total = parseFloat(row[3]) || 0;
        const grade = String(row[4] || '').trim();
        
        // Parse dimension totals - find the right column indices
        // A总分=index9, B总分=index15, C总分=index19, D总分=index27(AB列)
        let A = parseFloat(row[9]) || 0;
        let B = parseFloat(row[15]) || 0;
        let C = parseFloat(row[19]) || 0;
        let D = parseFloat(row[27]) || 0;
        
        // Parse sub-scores
        const a1 = parseFloat(row[5]) || 0;
        const a2 = parseFloat(row[6]) || 0;
        const a3 = parseFloat(row[7]) || 0;
        const a4 = parseFloat(row[8]) || 0;
        const b1 = parseFloat(row[10]) || 0;
        const b2 = parseFloat(row[11]) || 0;
        const b3 = parseFloat(row[12]) || 0;
        const b4 = parseFloat(row[13]) || 0;
        const b5 = parseFloat(row[14]) || 0;
        const c1 = parseFloat(row[16]) || 0;
        const c2 = parseFloat(row[17]) || 0;
        const c3 = parseFloat(row[18]) || 0;
        // D服务考核子项: d1包材(20-21), d1成品(22-23), d2业务支持(24-26)
        const d1a = parseFloat(row[20]) || 0;
        const d1b = parseFloat(row[21]) || 0;
        const d2a = parseFloat(row[22]) || 0;
        const d2b = parseFloat(row[23]) || 0;
        const d2c = parseFloat(row[24]) || 0;
        const d2d = parseFloat(row[25]) || 0;
        const d2e = parseFloat(row[26]) || 0;
        
        // Meeting conclusion (column index 28 = AC列)
        let conclusion = '';
        let conclusionColIdx = -1;
        for (let c = 28; c < row.length; c++) {
          if (row[c] && String(row[c]).trim()) {
            conclusion = String(row[c]).trim();
            conclusionColIdx = c;
            break;
          }
        }
        
        // Exception reason columns (AD-AI): 6 columns after conclusion
        let exceptionQuality = '', exceptionCost = '', exceptionDelivery = '';
        let exceptionServiceProduct = '', exceptionServicePackage = '', exceptionOther = '';
        if (conclusionColIdx >= 0) {
          exceptionQuality = String(row[conclusionColIdx + 1] || '').trim();
          exceptionCost = String(row[conclusionColIdx + 2] || '').trim();
          exceptionDelivery = String(row[conclusionColIdx + 3] || '').trim();
          exceptionServiceProduct = String(row[conclusionColIdx + 4] || '').trim();
          exceptionServicePackage = String(row[conclusionColIdx + 5] || '').trim();
          exceptionOther = String(row[conclusionColIdx + 6] || '').trim();
        }
        
        suppliers.push({
          name, category: String(row[2] || '').trim(),
          total, grade, A, B, C, D,
          a1, a2, a3, a4, b1, b2, b3, b4, b5,
          c1, c2, c3, d1a, d1b, d2a, d2b, d2c, d2d, d2e,
          conclusion,
          exceptionQuality, exceptionCost, exceptionDelivery,
          exceptionServiceProduct, exceptionServicePackage, exceptionOther
        });
      }
      
      // Try to extract month name from filename
      const fname = file.name || '';
      let monthName = '';
      const mMatch = fname.match(/(\d{1,2})月/);
      if (mMatch) monthName = mMatch[1] + '月';
      else monthName = '月份' + (STATE.months.length + 1);
      
      callback(null, { name: monthName, data: suppliers, fileName: fname });
    } catch (err) {
      callback(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function getGradeLetter(grade) {
  if (!grade) return '';
  if (grade.includes('A')) return 'A';
  if (grade.includes('B')) return 'B';
  if (grade.includes('C')) return 'C';
  if (grade.includes('D')) return 'D';
  return '';
}

function getGradeClass(grade) {
  return 'grade-' + getGradeLetter(grade);
}

function getAllSuppliers() {
  const set = new Set();
  STATE.months.forEach(m => m.data.forEach(s => set.add(s.name)));
  return [...set].sort();
}

function getSupplierData(name) {
  // Return {monthName: dataObj} for each month this supplier appears in
  const result = {};
  STATE.months.forEach(m => {
    const found = m.data.find(s => s.name === name);
    if (found) result[m.name] = found;
  });
  return result;
}

function normalizeName(name) {
  // Normalize supplier name for fuzzy matching
  return name.replace(/[（）()]/g, '').replace(/\s+/g, '').trim();
}

function findSupplierAcrossMonths(name) {
  // Find all data for a supplier across months, handling name variations
  const norm = normalizeName(name);
  const result = {};
  STATE.months.forEach(m => {
    for (const s of m.data) {
      if (normalizeName(s.name) === norm || s.name === name) {
        result[m.name] = s;
        break;
      }
    }
  });
  return result;
}

function getCanonicalName(name) {
  // Find the most complete name for a supplier
  const norm = normalizeName(name);
  let best = name;
  STATE.months.forEach(m => {
    for (const s of m.data) {
      if (normalizeName(s.name) === norm && s.name.length > best.length) {
        best = s.name;
      }
    }
  });
  return best;
}

// ========== UI Updates ==========
function updateAll() {
  updateHeader();
  updateMonthsBar();
  updateStats();
  updateTrendChart();
  updateGradeChart();
  updateGradeCountTable();
  updateDimAvgChart();
  updateRadarChart();
  updateHeatmapChart();
  updateRankTable();
  updateDetailTable();
  populateSelects();
}

function updateHeader() {
  const suppliers = getAllSuppliers().length;
  document.getElementById('headerInfo').textContent = 
    `已加载 ${STATE.months.length} 个月份数据 · ${suppliers} 家供应商 · ${STATE.monthNames.join('、') || '暂无数据'}`;
}

function updateMonthsBar() {
  const bar = document.getElementById('monthsBar');
  bar.innerHTML = STATE.months.map((m, i) => {
    const lockIcon = m.locked ? ' 🔒' : ' 📝';
    return `<span class="month-tag" draggable="true" data-idx="${i}">` +
      `<span class="drag-handle">⠿</span>${m.name}（${m.data.length}家）${lockIcon}` +
      `<span class="remove-btn" onclick="event.stopPropagation();removeMonth(${i})">×</span>` +
    `</span>`;
  }).join('');

  // Bind drag events
  const tags = bar.querySelectorAll('.month-tag');
  let dragSrcIdx = null;

  tags.forEach(tag => {
    tag.addEventListener('dragstart', function(e) {
      dragSrcIdx = parseInt(this.dataset.idx);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcIdx);
    });

    tag.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      tags.forEach(t => t.classList.remove('drag-over-left', 'drag-over-right'));
    });

    tag.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = this.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      tags.forEach(t => t.classList.remove('drag-over-left', 'drag-over-right'));
      if (e.clientX < midX) {
        this.classList.add('drag-over-left');
      } else {
        this.classList.add('drag-over-right');
      }
    });

    tag.addEventListener('dragleave', function() {
      this.classList.remove('drag-over-left', 'drag-over-right');
    });

    tag.addEventListener('drop', function(e) {
      e.preventDefault();
      const targetIdx = parseInt(this.dataset.idx);
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;

      // Determine insert position based on drop side
      const rect = this.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      let insertBefore = e.clientX < midX;

      // Move the item
      const item = STATE.months.splice(dragSrcIdx, 1)[0];
      // Recalculate target index after removal
      let newIdx = targetIdx;
      if (dragSrcIdx < targetIdx) newIdx--;
      if (!insertBefore) newIdx++;
      STATE.months.splice(newIdx, 0, item);

      // Update monthNames to match new order
      STATE.monthNames = STATE.months.map(m => m.name);

      updateAll();
    });
  });
}

function updateStats() {
  const grid = document.getElementById('statsGrid');
  if (STATE.months.length === 0) {
    grid.innerHTML = '';
    return;
  }
  
  // Update month selector options
  const statsMonthSel = document.getElementById('statsMonth');
  const currentSel = statsMonthSel.value;
  statsMonthSel.innerHTML = STATE.months.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
  // Restore selection or default to latest
  if (currentSel && STATE.monthNames.includes(currentSel)) {
    statsMonthSel.value = currentSel;
  } else {
    statsMonthSel.selectedIndex = STATE.months.length - 1;
  }
  
  const selectedMonthName = statsMonthSel.value;
  const selectedIdx = STATE.monthNames.indexOf(selectedMonthName);
  const selected = STATE.months[selectedIdx];
  const prev = selectedIdx > 0 ? STATE.months[selectedIdx - 1] : null;
  
  const avgTotal = selected.data.reduce((s, d) => s + d.total, 0) / selected.data.length;
  const prevAvg = prev ? prev.data.reduce((s, d) => s + d.total, 0) / prev.data.length : null;
  const change = prevAvg !== null ? (avgTotal - prevAvg).toFixed(1) : null;
  
  const gradeA = selected.data.filter(d => getGradeLetter(d.grade) === 'A').length;
  const gradeD = selected.data.filter(d => getGradeLetter(d.grade) === 'D').length;
  
  // Biggest improver and biggest decliner
  let bestImprove = { name: '-', val: 0 };
  let worstDecline = { name: '-', val: 0 };
  if (prev) {
    selected.data.forEach(s => {
      const prevData = prev.data.find(p => normalizeName(p.name) === normalizeName(s.name));
      if (prevData) {
        const diff = s.total - prevData.total;
        if (diff > bestImprove.val) bestImprove = { name: s.name.substring(0, 10), val: diff };
        if (diff < worstDecline.val) worstDecline = { name: s.name.substring(0, 10), val: diff };
      }
    });
  }
  
  const hasPrev = prev !== null;
  
  grid.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">${selected.name}平均总分</div>
      <div class="stat-value">${avgTotal.toFixed(1)}</div>
      ${hasPrev && change !== null ? `<div class="stat-change ${parseFloat(change) >= 0 ? 'up' : 'down'}">较${prev.name} ${parseFloat(change) >= 0 ? '↑' : '↓'} ${Math.abs(change)} 分</div>` : '<div class="stat-change" style="color:var(--gray-500)">首月数据，无对比</div>'}
    </div>
    <div class="stat-card">
      <div class="stat-label">${selected.name}A级供应商</div>

// ========== Charts ==========
let trendChartInstance, gradeChartInstance, dimAvgChartInstance, radarChartInstance, heatmapChartInstance;

function getOrCreateChart(id) {
  const el = document.getElementById(id);
  let instance = echarts.getInstanceByDom(el);
  if (instance) return instance;
  return echarts.init(el);
}

function updateTrendChart() {
  if (STATE.months.length === 0) return;
  const chart = getOrCreateChart('trendChart');
  const selectedMetrics = Array.from(trendSelectedMetrics);
  const selectedSuppliers = getTrendSelectedSuppliers();
  
  // Filter months by selected months
  const filteredMonths = STATE.months.filter(m => trendSelectedMonths.size === 0 || trendSelectedMonths.has(m.name));
  const xData = filteredMonths.map(m => m.name);
  let series = [];
  
  const colors = ['#4f6ef7','#f59e0b','#22c55e','#ef4444','#7c3aed','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6','#6366f1','#d946ef','#0ea5e9','#e11d48','#8b5cf6','#10b981'];
  
  if (selectedMetrics.length <= 1) {
    // Single metric mode: show supplier lines (existing behavior)
    const metric = selectedMetrics[0] || 'total';
    
    const avgData = filteredMonths.map(m => {
      const vals = m.data.map(s => metric === 'total' ? s.total : s[metric]);
      return vals.length > 0 ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
    });
    
    if (selectedSuppliers.length === 0) {
      series.push({
        name: '全员平均',
        type: 'line',
        data: avgData,
        smooth: true,
        lineStyle: { width: 3 },
        itemStyle: { color: '#4f6ef7' },
        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(79,110,247,.2)' },
          { offset: 1, color: 'rgba(79,110,247,0)' }
        ])}
      });
    } else if (selectedSuppliers.length <= 3) {
      selectedSuppliers.forEach((sup, si) => {
        const dataMap = findSupplierAcrossMonths(sup);
        const data = filteredMonths.map(m => {
          const d = dataMap[m.name];
          if (!d) return null;
          return metric === 'total' ? d.total : d[metric];
        });
        const canonicalName = getCanonicalName(sup);
        const shortName = canonicalName.length > 10 ? canonicalName.substring(0, 10) + '…' : canonicalName;
        const c = colors[si % colors.length];
        series.push({
          name: shortName,
          type: 'line',
          data: data,
          smooth: true,
          lineStyle: { width: 3 },
          itemStyle: { color: c },
          areaStyle: selectedSuppliers.length === 1 ? { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: c.replace(')', ',.2)').replace('rgb', 'rgba') },
            { offset: 1, color: c.replace(')', ',0)').replace('rgb', 'rgba') }
          ])} : undefined
        });
      });
      series.push({
        name: '全员平均',
        type: 'line',
        data: avgData,
        lineStyle: { width: 1, type: 'dashed' },
        itemStyle: { color: '#9ca3af' },
        symbol: 'none'
      });
    } else {
      selectedSuppliers.forEach((sup, si) => {
        const dataMap = findSupplierAcrossMonths(sup);
        const data = filteredMonths.map(m => {
          const d = dataMap[m.name];
          if (!d) return null;
          return metric === 'total' ? d.total : d[metric];
        });
        const canonicalName = getCanonicalName(sup);
        const shortName = canonicalName.length > 8 ? canonicalName.substring(0, 8) + '…' : canonicalName;
        series.push({
          name: shortName,
          type: 'line',
          data: data,
          smooth: true,
          lineStyle: { width: 2 },
          itemStyle: { color: colors[si % colors.length] },
          symbolSize: 5
        });
      });
    }
    
    const maxVal = metric === 'total' ? 100 : metric === 'A' ? 25 : metric === 'B' ? 20 : metric === 'C' ? 20 : 35;
    chart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { bottom: 0, type: 'scroll' },
      grid: { top: 20, right: 20, bottom: 60, left: 50 },
      xAxis: { type: 'category', data: xData, axisLine: { lineStyle: { color: '#e5e7eb' } } },
      yAxis: { type: 'value', min: Math.max(0, maxVal - 30), max: maxVal, axisLine: { show: false }, splitLine: { lineStyle: { color: '#f3f4f6' } } },
      series
    }, true);
  } else {
    // Multi-metric mode: show average line per metric
    const metricColors = {total:'#4f6ef7', A:'#f59e0b', B:'#22c55e', C:'#ef4444', D:'#7c3aed'};
    let maxVal = 0;
    
    selectedMetrics.forEach(metric => {
      const avgData = filteredMonths.map(m => {
        const vals = m.data.map(s => metric === 'total' ? s.total : s[metric]);
        return vals.length > 0 ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
      });
      maxVal = Math.max(maxVal, metric === 'total' ? 100 : metric === 'A' ? 25 : metric === 'B' ? 20 : metric === 'C' ? 20 : 35);
      series.push({
        name: trendMetricLabels[metric],
        type: 'line',
        data: avgData,
        smooth: true,
        lineStyle: { width: 3 },
        itemStyle: { color: metricColors[metric] || '#999' }
      });
    });
    
    chart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { bottom: 0, type: 'scroll' },
      grid: { top: 20, right: 20, bottom: 60, left: 50 },
      xAxis: { type: 'category', data: xData, axisLine: { lineStyle: { color: '#e5e7eb' } } },
      yAxis: { type: 'value', min: 0, max: maxVal, axisLine: { show: false }, splitLine: { lineStyle: { color: '#f3f4f6' } } },
      series
    }, true);
  }
}

// 共享计算函数：等级分布数据（图表和表格共用，确保一致）
function computeGradeDistribution() {
  const grades = ['A', 'B', 'C', 'D'];
  const monthNames = STATE.monthNames;
  const counts = {}; // { monthName: { A: n, B: n, C: n, D: n, total: n } }
  
  STATE.months.forEach(m => {
    const total = m.data.length;
    const mc = { total };
    grades.forEach(g => {
      mc[g] = m.data.filter(s => getGradeLetter(s.grade) === g).length;
    });
    counts[m.name] = mc;
  });
  
  return { grades, monthNames, counts };
}

function updateGradeChart() {
  if (STATE.months.length === 0) return;
  const chart = getOrCreateChart('gradeChart');
  
  const { grades, monthNames, counts } = computeGradeDistribution();
  const colors = ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'];
  const lastIdx = grades.length - 1;
  
  const series = grades.map((g, gi) => ({
    name: g + '级',
    type: 'bar',
    stack: 'total',
    data: monthNames.map(mn => counts[mn][g]),
    itemStyle: { 
      color: colors[gi], 
      borderRadius: gi === lastIdx ? [4, 4, 0, 0] : 0 
    },
    label: { show: false },
    barWidth: 48
  }));
  
  chart.setOption({
    tooltip: { 
      trigger: 'axis',
      formatter: function(params) {
        const mn = params[0].axisValue;
        const total = counts[mn].total;
        let html = '<b>' + mn + '</b>（共' + total + '家）<br/>';
        grades.forEach((g, gi) => {
          const c = counts[mn][g];
          const pct = total > 0 ? (c / total * 100).toFixed(1) : '0.0';
          html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + colors[gi] + ';margin-right:4px;"></span>';
          html += g + '级: <b>' + c + '</b>家 (' + pct + '%)<br/>';
        });
        return html;
      }
    },
    legend: { bottom: 0 },
    grid: { top: 20, right: 20, bottom: 50, left: 50 },
    xAxis: { type: 'category', data: monthNames },
    yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: '#f3f4f6' } } },
    series
  }, true);

function updateGradeCountTable() {
  const container = document.getElementById('gradeCountTable');
  if (STATE.months.length === 0) { container.innerHTML = ''; return; }

  // 使用共享计算函数，确保与图表数据完全一致
  const { grades, monthNames, counts } = computeGradeDistribution();
  const gradeColors = { A: '#22c55e', B: '#3b82f6', C: '#f59e0b', D: '#ef4444' };
  const gradeBgColors = { A: '#dcfce7', B: '#dbeafe', C: '#fef3c7', D: '#fee2e2' };

  let html = '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr>';
  html += '<th style="padding:8px 12px;text-align:left;background:#f3f4f6;border-bottom:2px solid #e5e7eb;">月份</th>';
  html += '<th style="padding:8px 12px;text-align:center;background:#f3f4f6;border-bottom:2px solid #e5e7eb;">总数</th>';
  grades.forEach(g => {
    html += `<th style="padding:8px 12px;text-align:center;background:#f3f4f6;border-bottom:2px solid #e5e7eb;">${g}级</th>`;
  });
  html += '</tr></thead><tbody>';

  // 按当前月份顺序显示（与图表x轴一致）
  monthNames.forEach(mn => {
    const mc = counts[mn];
    const total = mc.total;

    html += `<tr style="border-bottom:1px solid #f3f4f6;">`;
    html += `<td style="padding:8px 12px;font-weight:600;">${mn}</td>`;
    html += `<td style="padding:8px 12px;text-align:center;font-weight:700;">${total}</td>`;
    grades.forEach(g => {
      const c = mc[g];
      const pct = total > 0 ? (c / total * 100).toFixed(1) : '0.0';
      html += `<td style="padding:8px 12px;text-align:center;">`;
      html += `<span style="display:inline-block;min-width:28px;padding:2px 8px;border-radius:10px;font-weight:600;background:${gradeBgColors[g]};color:${gradeColors[g]};">${c}</span>`;
      html += `<span style="margin-left:4px;color:#6b7280;font-size:11px;">${pct}%</span>`;
      html += `</td>`;
    });
    html += `</tr>`;
  });

  // 合计行：跨所有月份的去重统计
  html += `<tr style="border-top:2px solid #e5e7eb;font-weight:600;background:#f9fafb;">`;
  const allTotal = STATE.months.reduce((s, m) => s + m.data.length, 0);
  html += `<td style="padding:8px 12px;">合计</td>`;
  html += `<td style="padding:8px 12px;text-align:center;font-weight:700;">${allTotal}</td>`;
  grades.forEach(g => {
    const count = monthNames.reduce((s, mn) => s + counts[mn][g], 0);
    const pct = allTotal > 0 ? (count / allTotal * 100).toFixed(1) : '0.0';
    html += `<td style="padding:8px 12px;text-align:center;">`;
    html += `<span style="display:inline-block;min-width:28px;padding:2px 8px;border-radius:10px;font-weight:600;background:${gradeBgColors[g]};color:${gradeColors[g]};">${count}</span>`;
    html += `<span style="margin-left:4px;color:#6b7280;font-size:11px;">${pct}%</span>`;
    html += `</td>`;
  });
  html += `</tr>`;
  html += '</tbody></table>';
  container.innerHTML = html;
}

// Compare supplier dropdown state
let compareSelectedSuppliers = new Set();
let compareAllSuppliersList = [];

function updateCompareSuppliers() {
  const catFilter = document.getElementById('compareCategory').value;
  
  // Get suppliers filtered by category
  const supplierMap = {};
  STATE.months.forEach(m => {
    m.data.forEach(s => {
      if (catFilter === 'all' || s.category === catFilter) {
        const norm = normalizeName(s.name);
        if (!supplierMap[norm]) supplierMap[norm] = getCanonicalName(s.name);
      }
    });
  });
  
  const suppliers = Object.values(supplierMap).sort();
  compareAllSuppliersList = suppliers;
  
  // Remove selected suppliers not in the current list
  const supplierSet = new Set(suppliers);
  for (const name of compareSelectedSuppliers) {
    if (!supplierSet.has(name)) compareSelectedSuppliers.delete(name);
  }
  
  // If no selection and we have suppliers, select all
  if (compareSelectedSuppliers.size === 0 && suppliers.length > 0) {
    suppliers.forEach(s => compareSelectedSuppliers.add(s));
  }
  
  renderCompareDropdownList();
  updateCompareDropdownDisplay();
}

function renderCompareDropdownList() {
  const listEl = document.getElementById('compareSupplierList');
  if (!compareAllSuppliersList.length) {
    listEl.innerHTML = '<div style="padding:10px;color:#999;font-size:13px;text-align:center;">暂无数据</div>';
    document.getElementById('compareSelectedCount').textContent = '已选 0 个';
    document.getElementById('compareToggleAllBtn').textContent = '全选';
    return;
  }
  const keyword = (document.getElementById('compareSupplierSearch')?.value || '').trim().toLowerCase();
  const filtered = !keyword ? compareAllSuppliersList : compareAllSuppliersList.filter(n => n.toLowerCase().includes(keyword));
  
  if (!filtered.length) {
    listEl.innerHTML = '<div style="padding:10px;color:#999;font-size:13px;text-align:center;">无匹配结果</div>';
    return;
  }
  
  listEl.innerHTML = filtered.map(s => {
    const checked = compareSelectedSuppliers.has(s);
    return `<div class="multi-select-item${checked ? ' selected' : ''}" data-value="${s}" onclick="toggleCompareSupplierItem(this, '${s.replace(/'/g, "\\'")}')">
      <input type="checkbox" class="multi-select-checkbox" ${checked ? 'checked' : ''}>
      <span class="multi-select-item-text">${s}</span>
    </div>`;
  }).join('');
  
  // Update count and toggle button
  document.getElementById('compareSelectedCount').textContent = `已选 ${compareSelectedSuppliers.size} 个`;
  document.getElementById('compareToggleAllBtn').textContent = compareSelectedSuppliers.size === compareAllSuppliersList.length ? '取消全选' : '全选';
}

function updateCompareDropdownDisplay() {
  const display = document.getElementById('compareSupplierDisplay');
  if (compareSelectedSuppliers.size === 0) {
    display.textContent = '全部供应商';
  } else if (compareSelectedSuppliers.size === 1) {
    display.textContent = Array.from(compareSelectedSuppliers)[0];
  } else if (compareSelectedSuppliers.size === compareAllSuppliersList.length) {
    display.textContent = '全部供应商';
  } else {
    display.textContent = `已选 ${compareSelectedSuppliers.size} 个`;
  }
}

function toggleCompareDropdown() {
  const panel = document.getElementById('compareSupplierPanel');
  const trigger = document.getElementById('compareSupplierTrigger');
  const isOpen = panel.style.display === 'block';
  if (isOpen) {
    panel.style.display = 'none';

function toggleCompareSupplierItem(itemEl, supplierName) {
  itemEl.classList.toggle('selected');
  const checkbox = itemEl.querySelector('.multi-select-checkbox');

    compareSelectedSuppliers.add(supplierName);
    checkbox.checked = true;

  }
  updateCompareDropdownDisplay();
  document.getElementById('compareSelectedCount').textContent = `已选 ${compareSelectedSuppliers.size} 个`;

function makeSparkline(values, color, maxVal, label) {
  // Generate inline SVG sparkline from array of numbers
  const w = 100, h = 28, pad = 3;
  const nums = values.map(v => parseFloat(v) || 0);
  if (nums.length === 0) return '-';
  if (nums.length === 1) {
    return `<svg width="${w}" height="${h}" style="vertical-align:middle"><circle cx="${w/2}" cy="${h/2}" r="3" fill="${color}"/><text x="${w/2+6}" y="${h/2+4}" font-size="10" fill="${color}">${nums[0]}</text></svg>`;
  }
  const min = Math.min(...nums) - 1;
  const max = Math.max(...nums) + 1;
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (nums.length - 1);
  const points = nums.map((v, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const dots = nums.map((v, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${color}" stroke="#fff" stroke-width="1"/>`;
  }).join('');
  const lastVal = nums[nums.length - 1];
  return `<svg width="${w}" height="${h}" style="vertical-align:middle" title="${label}: ${nums.join(' → ')}">
    <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="${w-2}" y="${h/2+3}" font-size="9" fill="${color}" text-anchor="end" font-weight="600">${lastVal}</text>
  </svg>`;
}

function buildTrendSparklines(supplierName) {

  const dims = [
    { key: 'A', color: '#4f6ef7', label: '品质', max: 25 },

    { key: 'D', color: '#22c55e', label: '服务', max: 35 }
  ];
  
  const dataMap = findSupplierAcrossMonths(supplierName);
  
  return dims.map(dim => {
    const values = STATE.monthNames.map(mName => {
      const d = dataMap[mName];
      return d ? d[dim.key] : null;
    }).filter(v => v !== null);
    return `<div style="display:flex;align-items:center;gap:2px;font-size:11px;white-space:nowrap;">
      <span style="color:${dim.color};font-weight:600;min-width:22px;">${dim.label}</span>
      ${makeSparkline(values, dim.color, dim.max, dim.label)}
    </div>`;
  }).join('');
}

  const displayList = [];
  rank2.forEach(s2 => {
    const s1 = rank1.find(x => normalizeName(x.name) === normalizeName(s2.name));
    const scoreDiff = s1 ? s2.total - s1.total : null;
    // Apply filters
    if (gradeFilter === 'up' && scoreDiff !== null && scoreDiff <= 0) return;
    if (gradeFilter === 'down' && scoreDiff !== null && scoreDiff >= 0) return;
    if (searchText && !s2.name.toLowerCase().includes(searchText)) return;
    displayList.push({ s1, s2, scoreDiff });
  });
  
  // Sort by latest month's original order
  displayList.sort((a, b) => {
    const idxA = orderedNames.findIndex(n => normalizeName(n) === normalizeName(a.s2.name));
    const idxB = orderedNames.findIndex(n => normalizeName(n) === normalizeName(b.s2.name));
    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
  });
  
  let html = `<table><thead><tr>
    <th rowspan="2">供应商</th><th rowspan="2">类别</th>
    <th colspan="3">${m1Name}</th>
    <th colspan="3">${m2Name}</th>
    <th rowspan="2">排名变化</th><th rowspan="2">分数变化</th>
    <th rowspan="2">维度差异</th>
    <th rowspan="2">差异原因</th>
    <th rowspan="2">维度趋势</th>
    <th rowspan="2">会议记录</th>
  </tr><tr>
    <th>排名</th><th>分数</th><th>等级</th>
    <th>排名</th><th>分数</th><th>等级</th>
  </tr></thead><tbody>`;
  
  function dimChangeText(label, v1, v2) {
    const diff = v2 - v1;
    const sign = diff > 0 ? '+' : '';
    return `${label}: ${v1}→${v2} (${sign}${diff.toFixed(1)})`;
  }
  
  function dimDiffHtml(s1, s2) {
    if (!s1) return '<span style="color:var(--gray-500)">-</span>';
    const parts = [
      { label: '品质', v1: s1.A, v2: s2.A },
      { label: '成本', v1: s1.B, v2: s2.B },
      { label: '交货', v1: s1.C, v2: s2.C },
      { label: '服务', v1: s1.D, v2: s2.D }
    ];
    // 省略变化为0的维度，不显示总分
    return parts.filter(p => p.v2 - p.v1 !== 0).map(p => {
      const text = dimChangeText(p.label, p.v1, p.v2);
      const m = text.match(/\(([+-]?[\d.]+)\)/);
      if (m) {
        const v = parseFloat(m[1]);
        const cls = v > 0 ? 'trend-up' : v < 0 ? 'trend-down' : 'trend-flat';
        return `<div class="${cls}" style="white-space:nowrap;font-size:12px">${text}</div>`;
      }
      return `<div style="font-size:12px">${text}</div>`;
    }).join('') || '<span style="color:var(--gray-500);font-size:12px">各维度持平</span>';
  }
  
  displayList.forEach(({ s1, s2, scoreDiff }) => {
    const rankChange = s1 ? s1.rank - s2.rank : '-';
    const scoreChange = s1 ? scoreDiff.toFixed(1) : '-';
    const rankClass = rankChange > 0 ? 'trend-up' : rankChange < 0 ? 'trend-down' : 'trend-flat';
    const scoreClass = scoreChange > 0 ? 'trend-up' : scoreChange < 0 ? 'trend-down' : 'trend-flat';
    const rankIcon = rankChange > 0 ? '↑' : rankChange < 0 ? '↓' : '→';
    const scoreIcon = scoreChange > 0 ? '↑' : scoreChange < 0 ? '↓' : '→';
    
    let dimHtml = dimDiffHtml(s1, s2);
    let reasonText = s1 ? generateAnalysisReason(s1, s2) : '<span style="color:var(--gray-500)">新增供应商</span>';
    let sparkHtml = buildTrendSparklines(s2.name);
    const noteKey = `${s2.name}_${m1Name}_${m2Name}`;
    const noteVal = meetingNotesCache[noteKey] || '';
    
    html += `<tr>
      <td style="font-weight:500">${s2.name}</td>
      <td>${s2.category}</td>
      <td>${s1 ? s1.rank : '-'}</td>
      <td>${s1 ? s1.total : '-'}</td>
      <td>${s1 ? `<span class="grade-badge ${getGradeClass(s1.grade)}">${s1.grade}</span>` : '-'}</td>
      <td><strong>${s2.rank}</strong></td>
      <td><strong>${s2.total}</strong></td>
      <td><span class="grade-badge ${getGradeClass(s2.grade)}">${s2.grade}</span></td>
      <td class="${rankClass}">${rankChange !== '-' ? rankIcon + ' ' + Math.abs(rankChange) : '新增'}</td>
      <td class="${scoreClass}">${scoreChange !== '-' ? scoreIcon + ' ' + Math.abs(scoreChange) : '新增'}</td>
      <td>${dimHtml}</td>
      <td style="max-width:220px;white-space:normal;font-size:12px;line-height:1.5">${reasonText}</td>
      <td style="min-width:130px">${sparkHtml}</td>
      <td><textarea class="meeting-notes-textarea" data-note-key="${noteKey}" onchange="meetingNotesCache[this.dataset.noteKey]=this.value" placeholder="输入会议记录...">${noteVal}</textarea></td>
    </tr>`;
  });
  
  // Suppliers in m1 but not in m2
  rank1.forEach(s1 => {
    const inM2 = rank2.find(x => normalizeName(x.name) === normalizeName(s1.name));
    if (!inM2) {
      let sparkHtml = buildTrendSparklines(s1.name);
      const noteKey2 = `${s1.name}_${m1Name}_${m2Name}`;
      const noteVal2 = meetingNotesCache[noteKey2] || '';
      html += `<tr style="opacity:.5">
        <td>${s1.name}</td><td>${s1.category}</td>
        <td>${s1.rank}</td><td>${s1.total}</td>
        <td><span class="grade-badge ${getGradeClass(s1.grade)}">${s1.grade}</span></td>
        <td colspan="7" style="color:var(--gray-500)">该月无数据</td>
        <td style="min-width:130px">${sparkHtml}</td>
        <td><textarea class="meeting-notes-textarea" data-note-key="${noteKey2}" onchange="meetingNotesCache[this.dataset.noteKey]=this.value" placeholder="输入会议记录...">${noteVal2}</textarea></td>
      </tr>`;
    }
  });
  
  html += '</tbody></table>';
  document.getElementById('rankTable').innerHTML = html;
}

function generateAnalysisReason(s1, s2) {
  // 差异原因与维度差异列保持一致：列出四个维度中变化不为0的项，省略总分
  const reasons = [];
  const dimNames = { A: '品质', B: '成本', C: '交货', D: '服务' };
  const dims = ['A', 'B', 'C', 'D'];
  
  dims.forEach(d => {
    const diff = s2[d] - s1[d];
    if (diff === 0) return; // 变化为0的省略
    const sign = diff > 0 ? '+' : '';
    reasons.push(`${dimNames[d]}${sign}${diff.toFixed(1)}`);
  });
  
  if (reasons.length === 0) reasons.push('各维度基本持平');
  
  return reasons.join('，');
}

function updateAnalysisList() {
  if (STATE.months.length < 2) {
    document.getElementById('analysisList').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>至少需要2个月份数据才能进行差异分析</p></div>';
    return;
  }
  
  const m1Name = document.getElementById('analysisMonth1').value;
  const m2Name = document.getElementById('analysisMonth2').value;
  const gradeFilter = document.getElementById('analysisGrade').value;
  const searchText = document.getElementById('analysisSearch').value.toLowerCase();
  
  if (!m1Name || !m2Name) return;
  
  const m1 = STATE.months.find(m => m.name === m1Name);
  const m2 = STATE.months.find(m => m.name === m2Name);
  if (!m1 || !m2) return;
  
  let items = [];
  m2.data.forEach(s2 => {
    const s1 = m1.data.find(x => normalizeName(x.name) === normalizeName(s2.name));
    if (!s1) return;
    
    const diff = s2.total - s1.total;
    if (gradeFilter === 'up' && diff <= 0) return;
    if (gradeFilter === 'down' && diff >= 0) return;
    if (searchText && !s2.name.toLowerCase().includes(searchText)) return;
    
    items.push({ s1, s2, diff });
  });
  
  // Sort by absolute difference descending
  items.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
  
  if (items.length === 0) {
    document.getElementById('analysisList').innerHTML = '<div class="empty-state"><p>没有匹配的差异数据</p></div>';
    return;
  }
  
  let html = '';
  items.forEach(({ s1, s2, diff }) => {
    const reason = generateAnalysisReason(s1, s2);
    const trendClass = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-flat';
    const trendIcon = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
    
    html += `<div class="analysis-row">
      <div class="analysis-header">
        <span class="analysis-name">${s2.name}</span>
        <div class="analysis-badges">
          <span class="grade-badge ${getGradeClass(s1.grade)}">${m1Name}: ${s1.grade}</span>
          <span class="grade-badge ${getGradeClass(s2.grade)}">${m2Name}: ${s2.grade}</span>
          <span class="${trendClass}" style="font-size:14px;font-weight:700">${trendIcon} ${Math.abs(diff).toFixed(1)}</span>
        </div>
      </div>
      <div class="analysis-dims">
        <div class="dim-item">品质: <span>${s1.A}→${s2.A}</span> (${s2.A - s1.A > 0 ? '+' : ''}${(s2.A - s1.A).toFixed(1)})</div>
        <div class="dim-item">成本: <span>${s1.B}→${s2.B}</span> (${s2.B - s1.B > 0 ? '+' : ''}${(s2.B - s1.B).toFixed(1)})</div>
        <div class="dim-item">交货: <span>${s1.C}→${s2.C}</span> (${s2.C - s1.C > 0 ? '+' : ''}${(s2.C - s1.C).toFixed(1)})</div>
        <div class="dim-item">服务: <span>${s1.D}→${s2.D}</span> (${s2.D - s1.D > 0 ? '+' : ''}${(s2.D - s1.D).toFixed(1)})</div>
        <div class="dim-item">总分: <span>${s1.total}→${s2.total}</span></div>
      </div>
      <div class="analysis-body">
        <div class="reason">📝 ${reason}</div>
      </div>
    </div>`;
  });
  
  document.getElementById('analysisList').innerHTML = html;
}

function exportRankAnalysis() {
  try {
    if (typeof XLSX === 'undefined') {
      showNotification('Excel组件加载失败，请刷新页面后重试', 'error');
      return;
    }
    
    const m1Name = document.getElementById('rankMonth1').value;
    const m2Name = document.getElementById('rankMonth2').value;
    if (!m1Name || !m2Name) { showNotification('请先选择对比月份', 'error'); return; }
    
    const m1 = STATE.months.find(m => m.name === m1Name);
    const m2 = STATE.months.find(m => m.name === m2Name);
    if (!m1 || !m2) return;
    
    const rank1 = [...m1.data].sort((a, b) => b.total - a.total).map((s, i) => ({ ...s, rank: i + 1 }));
    const rank2 = [...m2.data].sort((a, b) => b.total - a.total).map((s, i) => ({ ...s, rank: i + 1 }));
    
    const gradeFilter = document.getElementById('rankGrade').value;
    const searchText = document.getElementById('rankSearch').value.toLowerCase();
    
    const header = ['供应商', '类别', 
      m1Name + '排名', m1Name + '分数', m1Name + '等级',
      m2Name + '排名', m2Name + '分数', m2Name + '等级',
      '排名变化', '分数变化',
      '品质变化', '成本变化', '交货变化', '服务变化', '总分变化',
      '差异原因', '会议记录'];
    
    const rows = [header];
    
    rank2.forEach(s2 => {
      const s1 = rank1.find(x => normalizeName(x.name) === normalizeName(s2.name));
      const scoreDiff = s1 ? s2.total - s1.total : null;
      if (gradeFilter === 'up' && scoreDiff !== null && scoreDiff <= 0) return;
      if (gradeFilter === 'down' && scoreDiff !== null && scoreDiff >= 0) return;
      if (searchText && !s2.name.toLowerCase().includes(searchText)) return;
      
      const rankChange = s1 ? s1.rank - s2.rank : '-';
      const scoreChange = s1 ? scoreDiff.toFixed(1) : '-';
      const aChange = s1 ? `A:${s1.A}→${s2.A}(${(s2.A-s1.A)>=0?'+':''}${(s2.A-s1.A).toFixed(1)})` : '-';
      const bChange = s1 ? `B:${s1.B}→${s2.B}(${(s2.B-s1.B)>=0?'+':''}${(s2.B-s1.B).toFixed(1)})` : '-';
      const cChange = s1 ? `C:${s1.C}→${s2.C}(${(s2.C-s1.C)>=0?'+':''}${(s2.C-s1.C).toFixed(1)})` : '-';
      const dChange = s1 ? `D:${s1.D}→${s2.D}(${(s2.D-s1.D)>=0?'+':''}${(s2.D-s1.D).toFixed(1)})` : '-';
      const totalChange = s1 ? `总分:${s1.total}→${s2.total}(${scoreDiff>=0?'+':''}${scoreDiff.toFixed(1)})` : '-';
      const reason = s1 ? generateAnalysisReason(s1, s2) : '新增供应商';
      const noteKey = `${s2.name}_${m1Name}_${m2Name}`;
      const noteVal = meetingNotesCache[noteKey] || '';
      
      rows.push([s2.name, s2.category,
        s1 ? s1.rank : '-', s1 ? s1.total : '-', s1 ? s1.grade : '-',
        s2.rank, s2.total, s2.grade,
        rankChange, scoreChange,
        aChange, bChange, cChange, dChange, totalChange,
        reason, noteVal]);
    });
    
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Set column widths
    ws['!cols'] = [
      {wch:25},{wch:12},{wch:8},{wch:8},{wch:14},
      {wch:8},{wch:8},{wch:14},{wch:8},{wch:8},
      {wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:35},{wch:30}
    ];
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '排名变动与差异分析');
    XLSX.writeFile(wb, `排名变动与差异分析-${m1Name}vs${m2Name}.xlsx`);
    showNotification('✅ 排名数据导出成功', 'success');
  } catch (err) {
    showNotification('导出失败: ' + err.message, 'error');
  }
}

function addMonth(monthData) {
  // Check if month already exists
  const existingIdx = STATE.months.findIndex(m => m.name === monthData.name);
  if (existingIdx >= 0) {
    STATE.months[existingIdx] = monthData;
  } else {
    STATE.months.push(monthData);
  }
  STATE.monthNames = STATE.months.map(m => m.name);
  updateAll();
}

function removeMonth(idx) {
  STATE.months.splice(idx, 1);
  STATE.monthNames = STATE.months.map(m => m.name);
  updateAll();
}

function loadSupplierPool() {
  try {
    const data = localStorage.getItem('supplier_pool');
    supplierPool = data ? JSON.parse(data) : [];

    supplierPool.forEach(s => { if (s.disabled === undefined) s.disabled = false; });

  supplierPool.forEach((s, i) => {
    const isDisabled = s.disabled === true;
    const rowClass = isDisabled ? 'supplier-disabled' : '';
    const statusText = isDisabled ? '<span style="color:var(--danger);font-weight:600;">已禁用</span>' : '<span style="color:var(--success);font-weight:600;">启用中</span>';
    const toggleBtnText = isDisabled ? '✅ 启用' : '🚫 禁用';

    html += `<tr class="${rowClass}">
      <td>${i + 1}</td>
      <td style="font-weight:500">${s.name}</td>
      <td>${s.category}</td>
      <td>${statusText}</td>
      <td>
        <button class="pool-action-btn ${toggleBtnClass}" onclick="togglePoolSupplier(${i})">${toggleBtnText}</button>
        <button class="pool-action-btn" onclick="editPoolSupplier(${i})" style="margin-left:4px">✏️ 编辑</button>
        <button class="pool-action-btn danger" onclick="deletePoolSupplier(${i})" style="margin-left:4px">🗑️ 删除</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;

function updatePoolCategoryList() {
  const categories = new Set();
  supplierPool.forEach(s => { if (s.category) categories.add(s.category); });

  STATE.months.forEach(m => m.data.forEach(s => { if (s.category) categories.add(s.category); }));
  const datalist = document.getElementById('poolCategoryList');
  if (datalist) {
    datalist.innerHTML = [...categories].sort().map(c => `<option value="${c}">`).join('');

function savePoolSupplier() {
  const name = document.getElementById('poolSupplierName').value.trim();
  const category = document.getElementById('poolSupplierCategory').value.trim();
  
  if (!name) {
    showNotification('请输入供应商名称', 'error');
    return;
  }
  if (!category) {
    showNotification('请输入供应商类别', 'error');
    return;
  }
  
  if (poolEditIndex >= 0) {
    const wasDisabled = supplierPool[poolEditIndex].disabled || false;
    supplierPool[poolEditIndex] = { name, category, disabled: wasDisabled };
    showNotification('✅ 供应商信息已更新', 'success');
  } else {
    // Check duplicate
    if (supplierPool.some(s => s.name === name)) {
      showNotification('该供应商已存在', 'error');
      return;
    }
    supplierPool.push({ name, category, disabled: false });
    showNotification('✅ 供应商已添加', 'success');
  }
  
  saveSupplierPoolToStorage();
  renderSupplierPool();
  closePoolModal();
}

  const name = supplierPool[index].name;

function importSupplierPoolBatch(input) {
  if (!input.files || input.files.length === 0) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      
      let added = 0, skipped = 0;
      const existingNames = new Set(supplierPool.map(s => s.name));
      
      // Skip header row: check if first data row looks like a header
      let startRow = 0;
      if (rows.length > 0) {
        const firstRow = rows[0];
        const firstCell = String(firstRow[0] || '').trim();
        const secondCell = String(firstRow[1] || '').trim();
        if (firstCell.includes('序号') || firstCell.includes('编号') || 
            secondCell.includes('名称') || secondCell.includes('供应商')) {
          startRow = 1;
        }
      }
      
      for (let i = startRow; i < rows.length; i++) {
        const row = rows[i];
        // Name is in column 1 (second column), category in column 2
        let name = String(row[1] || '').trim();
        let category = String(row[2] || '').trim();
        
        // If column 1 is empty, try column 0
        if (!name) {
          name = String(row[0] || '').trim();
          category = String(row[1] || '').trim();
        }
        
        if (!name || name === '供应商名称') continue;
        
        if (existingNames.has(name)) {
          skipped++;
          continue;
        }
        
        supplierPool.push({ name, category: category || '未分类', disabled: false });
        existingNames.add(name);
        added++;
      }
      
      saveSupplierPoolToStorage();
      renderSupplierPool();
      showNotification(`✅ 导入完成：新增 ${added} 个，跳过重复 ${skipped} 个`, 'success');
    } catch (err) {
      showNotification('导入失败: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

}

function renderScoringTable() {
  populateScoringMonthSelect();
  const container = document.getElementById('scoringTableContainer');
  const statusArea = document.getElementById('scoringStatusArea');
  
  // Show month status
  const monthName = document.getElementById('scoringMonth').value;
  if (monthName) {
    const monthObj = STATE.months.find(m => m.name === monthName);
    const isLocked = monthObj && monthObj.locked;
    statusArea.innerHTML = isLocked 
      ? '<span class="status-badge status-locked">\ud83d\udd12 已提交</span><span style="color:var(--gray-500);font-size:12px;margin-left:8px;">该月份打分已提交，不可修改</span>'
      : '<span class="status-badge status-draft">\ud83d\udcdd 草稿</span><span style="color:var(--gray-500);font-size:12px;margin-left:8px;">可继续编辑，提交后不可修改</span>';
    const btnSave = document.getElementById('btnSaveScoring');
    const btnSubmit = document.getElementById('btnSubmitScoring');
    if (btnSave) btnSave.disabled = isLocked;
    if (btnSubmit) btnSubmit.disabled = isLocked;
  } else {
    statusArea.innerHTML = '';
  }
  
  // Build combined supplier list from pool + existing data
  // Filter out disabled suppliers from pool
  const supplierMap = {};
  supplierPool.forEach(s => {
    if (s.disabled) return; // Skip disabled suppliers
    const key = normalizeName(s.name);
    if (!supplierMap[key]) supplierMap[key] = { name: s.name, category: s.category };
  });
  STATE.months.forEach(m => {
    m.data.forEach(s => {
      const key = normalizeName(s.name);
      if (!supplierMap[key]) supplierMap[key] = { name: s.name, category: s.category };
    });
  });
  
  const suppliers = Object.values(supplierMap).sort((a, b) => a.name.localeCompare(b.name, 'zh'));
  
  if (suppliers.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✍️</div><div>暂无供应商，请先在"供应商池"中添加或上传考核数据</div></div>';
    return;
  }
  
  // Load existing data if month is selected
  const existingData = {};
  if (monthName) {
    const month = STATE.months.find(m => m.name === monthName);
    if (month) {
      month.data.forEach(s => {
        existingData[normalizeName(s.name)] = s;
      });
    }
  }
  
  // Build scoring rows
  scoringData = suppliers.map((s, idx) => {
    const existing = existingData[normalizeName(s.name)];
    return {
      index: idx,
      name: s.name,
      category: s.category,
      A: existing ? (existing.A || 0) : 0,
      B: existing ? (existing.B || 0) : 0,
      C: existing ? (existing.C || 0) : 0,
      D: existing ? (existing.D || 0) : 0,
      a1: existing ? (existing.a1 || 0) : 0,
      a2: existing ? (existing.a2 || 0) : 0,
      a3: existing ? (existing.a3 || 0) : 0,

function onScoringInput(el) {
  const rowIdx = parseInt(el.dataset.row);
  const field = el.dataset.field;
  const val = parseFloat(el.value) || 0;
  
  // Max values for sub-items
  const maxVals = {
    a1: 7, a2: 8, a3: 5, a4: 5,
    b1: 5, b2: 4, b3: 5, b4: 3, b5: 3,
    c1: 8, c2: 6, c3: 6,
    d1a: 10, d1b: 10, d2a: 10, d2b: 10, d2c: 5, d2d: 5, d2e: 5,
    A: 25, B: 20, C: 20, D: 35
  };
  
  if (field === 'conclusion') {
    scoringData[rowIdx].conclusion = el.value;
    return;
  }
  
  // Validate range for sub-items
  if (maxVals[field] !== undefined) {
    if (val < 0) { el.value = 0; scoringData[rowIdx][field] = 0; el.classList.remove('out-of-range'); }
    else if (val > maxVals[field]) { el.value = maxVals[field]; scoringData[rowIdx][field] = maxVals[field]; el.classList.add('out-of-range'); showNotification(`${field}最高${maxVals[field]}分，已自动修正`, 'error'); }
    else { scoringData[rowIdx][field] = val; el.classList.remove('out-of-range'); }
  } else {
    scoringData[rowIdx][field] = val;
  }
  
  const row = scoringData[rowIdx];
  
  // Calculate dimension totals from sub-items
  const A = (parseFloat(row.a1)||0) + (parseFloat(row.a2)||0) + (parseFloat(row.a3)||0) + (parseFloat(row.a4)||0);
  const B = (parseFloat(row.b1)||0) + (parseFloat(row.b2)||0) + (parseFloat(row.b3)||0) + (parseFloat(row.b4)||0) + (parseFloat(row.b5)||0);
  const C = (parseFloat(row.c1)||0) + (parseFloat(row.c2)||0) + (parseFloat(row.c3)||0);
  const D = (parseFloat(row.d1a)||0) + (parseFloat(row.d1b)||0) + (parseFloat(row.d2a)||0) + (parseFloat(row.d2b)||0) + (parseFloat(row.d2c)||0) + (parseFloat(row.d2d)||0) + (parseFloat(row.d2e)||0);
  
  row.A = A; row.B = B; row.C = C; row.D = D;
  
  const total = A + B + C + D;
  const grade = getGradeFromTotal(total);
  const gradeLetter = getGradeLetter(grade);
  
  // Update dimension totals
  const elA = document.getElementById(`scoringA_${rowIdx}`);
  const elB = document.getElementById(`scoringB_${rowIdx}`);
  const elC = document.getElementById(`scoringC_${rowIdx}`);
  const elD = document.getElementById(`scoringD_${rowIdx}`);
  if (elA) elA.textContent = A.toFixed(1);
  if (elB) elB.textContent = B.toFixed(1);
  if (elC) elC.textContent = C.toFixed(1);
  if (elD) elD.textContent = D.toFixed(1);
  
  // Update total and grade
  document.getElementById(`scoringTotal_${rowIdx}`).textContent = total.toFixed(1);
  document.getElementById(`scoringGrade_${rowIdx}`).textContent = grade;
  document.getElementById(`scoringGrade_${rowIdx}`).className = `grade-badge grade-${gradeLetter}`;
}

function saveScoringMonth(isSubmit) {
  const monthName = document.getElementById('scoringMonth').value;
  if (!monthName) {
    showNotification('请先选择或新建月份', 'error');
    return;
  }
  
  // Check if locked
  const monthObj = STATE.months.find(m => m.name === monthName);
  if (monthObj && monthObj.locked) {
    showNotification('该月份已提交，不可修改', 'error');
    return;
  }
  
  if (scoringData.length === 0) {
    showNotification('没有可保存的数据', 'error');
    return;
  }
  
  // For submit: validate supplier count
  if (isSubmit) {
    const activePoolCount = supplierPool.filter(s => !s.disabled).length;
    const scoredCount = scoringData.filter(r => (parseFloat(r.A) || 0) + (parseFloat(r.B) || 0) + (parseFloat(r.C) || 0) + (parseFloat(r.D) || 0) > 0).length;
    if (scoredCount < activePoolCount) {
      showNotification(`提交失败：打分供应商数量（${scoredCount}）少于供应商池非禁用供应商数量（${activePoolCount}）`, 'error');
      return;
    }
    if (!confirm(`确认提交"${monthName}"的打分数据？提交后不可修改。`)) return;
  } else {
    // Draft save: check if any data
    const hasData = scoringData.some(r => (parseFloat(r.A) || 0) + (parseFloat(r.B) || 0) + (parseFloat(r.C) || 0) + (parseFloat(r.D) || 0) > 0);
    if (!hasData) {
      if (!confirm('所有供应商分数均为0，确定保存吗？')) return;
    }
  }
  
  // Build data array
  const newData = [];
  
  scoringData.forEach(row => {
    const A = parseFloat(row.A) || 0;
    const B = parseFloat(row.B) || 0;
    const C = parseFloat(row.C) || 0;
    const D = parseFloat(row.D) || 0;
    const total = A + B + C + D;
    const grade = getGradeFromTotal(total);
    
    // Preserve existing sub-item data if available
    const existingMonth = STATE.months.find(m => m.name === monthName);
    let existingSupplier = null;
    if (existingMonth) {
      existingSupplier = existingMonth.data.find(s => normalizeName(s.name) === normalizeName(row.name));
    }
    
    // Include if has scores or was already in the month
    const wasInMonth = existingMonth && existingMonth.data.some(s => normalizeName(s.name) === normalizeName(row.name));
    if (total > 0 || wasInMonth) {
      newData.push({
        name: row.name,
        category: row.category,
        A, B, C, D, total, grade,
        a1: row.a1 || 0,
        a2: row.a2 || 0,
        a3: row.a3 || 0,
        a4: row.a4 || 0,
        b1: row.b1 || 0,
        b2: row.b2 || 0,
        b3: row.b3 || 0,
        b4: row.b4 || 0,
        b5: row.b5 || 0,
        c1: row.c1 || 0,
        c2: row.c2 || 0,
        c3: row.c3 || 0,
        d1a: row.d1a || 0,
        d1b: row.d1b || 0,
        d2a: row.d2a || 0,
        d2b: row.d2b || 0,
        d2c: row.d2c || 0,
        d2d: row.d2d || 0,
        d2e: row.d2e || 0,
        conclusion: row.conclusion || '',
        exceptionQuality: existingSupplier ? (existingSupplier.exceptionQuality || '') : '',
        exceptionCost: existingSupplier ? (existingSupplier.exceptionCost || '') : '',
        exceptionDelivery: existingSupplier ? (existingSupplier.exceptionDelivery || '') : '',
        exceptionServiceProduct: existingSupplier ? (existingSupplier.exceptionServiceProduct || '') : '',
        exceptionServicePackage: existingSupplier ? (existingSupplier.exceptionServicePackage || '') : '',
        exceptionOther: existingSupplier ? (existingSupplier.exceptionOther || '') : ''
      });
    }
  });
  
  // Update or add month, preserving locked status
  const existingIdx = STATE.months.findIndex(m => m.name === monthName);
  const wasLocked = existingIdx >= 0 && STATE.months[existingIdx].locked;
  const monthData = { name: monthName, data: newData, fileName: monthName + '手动打分', locked: isSubmit ? true : wasLocked };
  
  if (existingIdx >= 0) {
    STATE.months[existingIdx] = monthData;
  } else {
    STATE.months.push(monthData);
  }
  STATE.monthNames = STATE.months.map(m => m.name);
  updateAll();
  
  if (isSubmit) {
    showNotification(`🚀 "${monthName}"打分已提交！${newData.length} 个供应商数据已同步到明细数据`, 'success');
    // Re-render scoring table to show readonly
    renderScoringTable();
  } else {
    showNotification(`✅ 已保存 ${newData.length} 个供应商的打分草稿到"${monthName}"`, 'success');
  }
}
