function importScoringFromExcel(input) {
  if (!input.files || input.files.length === 0) return;
  const monthName = document.getElementById('scoringMonth').value;
  if (!monthName) {
    showNotification('请先选择或新建月份再导入', 'error');
    input.value = '';
    return;
  }
  
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      // Try to find the scoring sheet
      let ws = null;
      let sheetName = '';
      for (const sn of wb.SheetNames) {
        if (sn.includes('打分') || sn.includes('汇总') || sn.includes('考核')) {
          ws = wb.Sheets[sn];
          sheetName = sn;
          break;
        }
      }
      if (!ws) {
        ws = wb.Sheets[wb.SheetNames[0]];
        sheetName = wb.SheetNames[0];
      }
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      
      // Detect format: full template or simplified
      // Full template has sub-item headers in rows 0-2
      // Simplified has just: 序号, 供应商名称, 类别, A总分, B总分, C总分, D总分, 总分, 等级
      let isFullTemplate = false;
      // Check if row 0 or 1 contains sub-item markers like 'a1' or '验货合格率'
      for (let r = 0; r < Math.min(3, rows.length); r++) {
        const rowStr = rows[r].join('|').toLowerCase();
        if (rowStr.includes('验货') || rowStr.includes('客诉') || rowStr.includes('a1') || rowStr.includes('价格水平')) {
          isFullTemplate = true;
          break;
        }
      }
      
      // Find data start row
      let dataStart = 0;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const cell0 = String(row[0] || '').trim();
        const cell1 = String(row[1] || '').trim();
        // Data rows start with a number (序号) followed by a supplier name
        if (cell0 && !isNaN(parseInt(cell0)) && parseInt(cell0) > 0 && cell1 && cell1 !== '供应商名称') {
          dataStart = i;
          break;
        }
      }
      
      let imported = 0;
      for (let i = dataStart; i < rows.length; i++) {
        const row = rows[i];
        
        // Try to detect name column
        let nameCol = 1; // Default: column 1 (second column)
        let name = String(row[nameCol] || '').trim();
        if (!name || name === '供应商名称') {
          // Try column 0
          name = String(row[0] || '').trim();
          nameCol = 0;
        }
        if (!name) continue;
        // Skip if it looks like a header
        if (name.includes('供应商') && name.includes('名称')) continue;
        
        const categoryCol = nameCol + 1;
        const category = String(row[categoryCol] || '').trim() || '未分类';
        
        let A, B, C, D, total, grade;
        let a1=0,a2=0,a3=0,a4=0,b1=0,b2=0,b3=0,b4=0,b5=0,c1=0,c2=0,c3=0;
        let d1a=0,d1b=0,d2a=0,d2b=0,d2c=0,d2d=0,d2e=0;
        let conclusion = '';
        
        if (isFullTemplate) {
          // Full template format: cols match the standard template
          // 0=序号, 1=名称, 2=类别, 3=总分, 4=等级
          // A: 5=a1, 6=a2, 7=a3, 8=a4, 9=A总分
          // B: 10=b1, 11=b2, 12=b3, 13=b4, 14=b5, 15=B总分
          // C: 16=c1, 17=c2, 18=c3, 19=C总分  (but in the template, there might be an extra "A 成本考核(15)" column)
          // Actually from the template analysis: 
          // Col 0=序号, 1=名称, 2=类别, 3=总分, 4=等级
          // Col 5-8: a1-a4, Col 9: A总分
          // Col 10-14: b1-b5, Col 15: B总分
          // Col 16: (可能是额外的A成本考核列), Col 17-19: c1-c3 (with offset), Col 20: C总分
          // Let me use a more flexible approach based on actual header detection
          
          // Use column position based on the known template structure
          // From the Excel analysis: 
          // 0=序号 1=供应商名称 2=供应商类别 3=总分 4=供应商等级
          // 5=a1(验货合格率7) 6=a2(客诉率8) 7=a3(新品5) 8=a4(改善5) 9=A总分
          // 10=b1(价格5) 11=b2(周期4) 12=b3(付款5) 13=b4(报价3) 14=b5(成本3) 15=B总分
          // 16=(额外列-A成本考核15) 
          // 17=c1(延迟8) 18=c2(短缺6) 19=c3(配合6) 20=C总分
          // 21=d1a(包材技术10) 22=d1b(包材评估10) 23=d2a(配方技术10) 24=d2b(配方评估10) 25=d2c(研发5) 26=d2d(业务5) 27=d2e(响应5) 28=D总分
          // 29=会议结论/异常原因分析 etc.
          
          a1 = parseFloat(row[5]) || 0;
          a2 = parseFloat(row[6]) || 0;
          a3 = parseFloat(row[7]) || 0;
          a4 = parseFloat(row[8]) || 0;
          A = parseFloat(row[9]) || (a1 + a2 + a3 + a4);
          
          b1 = parseFloat(row[10]) || 0;
          b2 = parseFloat(row[11]) || 0;
          b3 = parseFloat(row[12]) || 0;
          b4 = parseFloat(row[13]) || 0;
          b5 = parseFloat(row[14]) || 0;
          B = parseFloat(row[15]) || (b1 + b2 + b3 + b4 + b5);
          
          // Column 16 might be an extra column, try C sub-items starting from 17
          c1 = parseFloat(row[17]) || 0;
          c2 = parseFloat(row[18]) || 0;
          c3 = parseFloat(row[19]) || 0;
          C = parseFloat(row[20]) || (c1 + c2 + c3);
          
          // If C values look wrong (all zeros), try alternate column positions
          if (C === 0 && c1 === 0 && c2 === 0 && c3 === 0) {
            c1 = parseFloat(row[16]) || 0;
            c2 = parseFloat(row[17]) || 0;
            c3 = parseFloat(row[18]) || 0;
            C = parseFloat(row[19]) || (c1 + c2 + c3);
            // Adjust D columns accordingly
            d1a = parseFloat(row[20]) || 0;
            d1b = parseFloat(row[21]) || 0;
            d2a = parseFloat(row[22]) || 0;
            d2b = parseFloat(row[23]) || 0;
            d2c = parseFloat(row[24]) || 0;
            d2d = parseFloat(row[25]) || 0;
            d2e = parseFloat(row[26]) || 0;
            D = parseFloat(row[27]) || (d1a + d1b + d2a + d2b + d2c + d2d + d2e);
            conclusion = String(row[28] || '').trim();
          } else {
            d1a = parseFloat(row[21]) || 0;
            d1b = parseFloat(row[22]) || 0;
            d2a = parseFloat(row[23]) || 0;
            d2b = parseFloat(row[24]) || 0;
            d2c = parseFloat(row[25]) || 0;
            d2d = parseFloat(row[26]) || 0;
            d2e = parseFloat(row[27]) || 0;
            D = parseFloat(row[28]) || (d1a + d1b + d2a + d2b + d2c + d2d + d2e);
            conclusion = String(row[29] || '').trim();
          }
          
          total = parseFloat(row[3]) || (A + B + C + D);
          grade = String(row[4] || getGradeFromTotal(total)).trim();
        } else {
          // Simplified format: 序号, 名称, 类别, A总分, B总分, C总分, D总分, [总分], [等级]
          A = parseFloat(row[nameCol + 2]) || 0;
          B = parseFloat(row[nameCol + 3]) || 0;
          C = parseFloat(row[nameCol + 4]) || 0;
          D = parseFloat(row[nameCol + 5]) || 0;
          total = A + B + C + D;
          grade = getGradeFromTotal(total);
        }
        
        // Find or create scoring row
        const normName = normalizeName(name);
        let scoringRow = scoringData.find(r => normalizeName(r.name) === normName);
        if (!scoringRow) {
          scoringRow = { index: scoringData.length, name, category, A: 0, B: 0, C: 0, D: 0, conclusion: '', a1:0,a2:0,a3:0,a4:0,b1:0,b2:0,b3:0,b4:0,b5:0,c1:0,c2:0,c3:0,d1a:0,d1b:0,d2a:0,d2b:0,d2c:0,d2d:0,d2e:0 };
          scoringData.push(scoringRow);
        }
        scoringRow.A = A;
        scoringRow.B = B;
        scoringRow.C = C;
        scoringRow.D = D;
        scoringRow.a1 = a1; scoringRow.a2 = a2; scoringRow.a3 = a3; scoringRow.a4 = a4;
        scoringRow.b1 = b1; scoringRow.b2 = b2; scoringRow.b3 = b3; scoringRow.b4 = b4; scoringRow.b5 = b5;
        scoringRow.c1 = c1; scoringRow.c2 = c2; scoringRow.c3 = c3;
        scoringRow.d1a = d1a; scoringRow.d1b = d1b;
        scoringRow.d2a = d2a; scoringRow.d2b = d2b; scoringRow.d2c = d2c; scoringRow.d2d = d2d; scoringRow.d2e = d2e;
        scoringRow.conclusion = conclusion;
        imported++;
      }
      
      renderScoringTableHTML();
      showNotification(`✅ 已从Excel导入 ${imported} 个供应商的打分数据${isFullTemplate ? '（含子项明细）' : ''}`, 'success');
    } catch (err) {
      showNotification('导入失败: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// ========== Export Scoring Template ==========
function exportScoringTemplate() {
  try {
    if (typeof XLSX === 'undefined') {
      showNotification('Excel组件加载失败，请刷新页面后重试', 'error');
      return;
    }
    
    const monthName = document.getElementById('scoringMonth').value;
    if (!monthName) {
      showNotification('请先选择月份再导出', 'error');
      return;
    }
    
    // Get non-disabled suppliers from pool
    const activePool = supplierPool.filter(s => !s.disabled);
    
    // Build existing data map
    const monthObj = STATE.months.find(m => m.name === monthName);
    const existingMap = {};
    if (monthObj) {
      monthObj.data.forEach(s => {
        existingMap[normalizeName(s.name)] = s;
      });
    }
    
    // Also include suppliers from scoringData
    scoringData.forEach(r => {
      const norm = normalizeName(r.name);
      if (!existingMap[norm]) {
        existingMap[norm] = r;
      }
    });
    
    // Double-layer header matching scoring table format
    const headerRow1 = ['序号', '供应商名称', '供应商类别',
      'A 品质考核（25）', '', '', '', 'A总分',
      'B 成本考核（20）', '', '', '', '', 'B总分',
      'C 交货考核（20）', '', '', 'C总分',
      'D 产品开发-包材（20）', '',
      'D 产品开发-成品（20）', '',
      'D 业务支持（15）', '', '',
      'D总分', '总分', '供应商等级', '会议结论'];
    const headerRow2 = ['', '', '',
      'a1验货合格率(7)', 'a2综合客诉率(8)', 'a3新品开发质量(5)', 'a4质量改善完成率(5)', '',
      'b1价格水平(5)', 'b2供货周期(4)', 'b3付款条件(5)', 'b4报价准确(3)', 'b5成本支持(3)', '',
      'c1交货延迟批次(8)', 'c2交货数量短缺(6)', 'c3订单交付配合度(6)', '',
      'd1a包材技术支持(10)', 'd1b包材技术评估(10)',
      'd2a成品技术支持(10)', 'd2b成品技术评估(10)',
      'd2c研发打样(5)', 'd2d业务支持度(5)', 'd2e响应配合度(5)',
      '', '', '', ''];
    
    const dataRows = [headerRow1, headerRow2];
    
    // Export all active pool suppliers (even those without scores)
    const allSuppliers = [];
    const addedNames = new Set();
    
    // First add active pool suppliers
    activePool.forEach((s, i) => {
      allSuppliers.push({ name: s.name, category: s.category });
      addedNames.add(normalizeName(s.name));
    });
    
    // Then add any scoring data suppliers not in pool
    scoringData.forEach(r => {
      const norm = normalizeName(r.name);
      if (!addedNames.has(norm)) {
        allSuppliers.push({ name: r.name, category: r.category });
        addedNames.add(norm);
      }
    });
    
    allSuppliers.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
    
    allSuppliers.forEach((s, i) => {
      const norm = normalizeName(s.name);
      const d = existingMap[norm];
      if (d) {
        const A = (d.a1||0) + (d.a2||0) + (d.a3||0) + (d.a4||0);
        const B = (d.b1||0) + (d.b2||0) + (d.b3||0) + (d.b4||0) + (d.b5||0);
        const C = (d.c1||0) + (d.c2||0) + (d.c3||0);
        const D = (d.d1a||0) + (d.d1b||0) + (d.d2a||0) + (d.d2b||0) + (d.d2c||0) + (d.d2d||0) + (d.d2e||0);
        const total = (d.total !== undefined) ? d.total : (A + B + C + D);
        const grade = d.grade || getGradeFromTotal(total);
        dataRows.push([
          i + 1, s.name, s.category,
          d.a1||0, d.a2||0, d.a3||0, d.a4||0, d.A||A,
          d.b1||0, d.b2||0, d.b3||0, d.b4||0, d.b5||0, d.B||B,
          d.c1||0, d.c2||0, d.c3||0, d.C||C,
          d.d1a||0, d.d1b||0, d.d2a||0, d.d2b||0, d.d2c||0, d.d2d||0, d.d2e||0, d.D||D,
          total, grade, d.conclusion || ''
        ]);
      } else {
        // Empty row for user to fill
        dataRows.push([i + 1, s.name, s.category,
          '', '', '', '', '',
          '', '', '', '', '', '',
          '', '', '', '',
          '', '', '', '', '', '', '', '',
          '', '', '']);
      }
    });
    
    const ws = XLSX.utils.aoa_to_sheet(dataRows);
    // Apply merges for group headers
    ws['!merges'] = [
      {s:{r:0,c:3},e:{r:0,c:6}},   // A 品质考核（25）
      {s:{r:0,c:7},e:{r:1,c:7}},   // A总分
      {s:{r:0,c:8},e:{r:0,c:12}},  // B 成本考核（20）
      {s:{r:0,c:13},e:{r:1,c:13}}, // B总分
      {s:{r:0,c:14},e:{r:0,c:16}}, // C 交货考核（20）
      {s:{r:0,c:17},e:{r:1,c:17}}, // C总分
      {s:{r:0,c:18},e:{r:0,c:19}}, // D 产品开发-包材（20）
      {s:{r:0,c:20},e:{r:0,c:21}}, // D 产品开发-成品（20）
      {s:{r:0,c:22},e:{r:0,c:24}}, // D 业务支持（15）
      {s:{r:0,c:25},e:{r:1,c:25}}, // D总分
      {s:{r:0,c:0},e:{r:1,c:0}},   // 序号
      {s:{r:0,c:1},e:{r:1,c:1}},   // 供应商名称
      {s:{r:0,c:2},e:{r:1,c:2}},   // 供应商类别
      {s:{r:0,c:26},e:{r:1,c:26}}, // 总分
      {s:{r:0,c:27},e:{r:1,c:27}}, // 供应商等级
      {s:{r:0,c:28},e:{r:1,c:28}}, // 会议结论
    ];
    ws['!cols'] = [
      {wch:5},{wch:30},{wch:15},
      {wch:10},{wch:10},{wch:10},{wch:10},{wch:8},
      {wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},
      {wch:10},{wch:10},{wch:10},{wch:8},
      {wch:12},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:8},
      {wch:8},{wch:14},{wch:20}
    ];
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '汇总-打分细则');
    XLSX.writeFile(wb, `供应商绩效考核打分模板-${monthName}.xlsx`);
    showNotification(`✅ 已导出 ${allSuppliers.length} 个供应商的打分模板`, 'success');
  } catch (err) {
    showNotification('导出失败: ' + err.message, 'error');
  }
}

// ========== Event Handlers ==========
function initEvents() {
  // File upload
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => handleFiles(e.target.files));
  
  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      // Re-render charts after layout settles
      setTimeout(() => {
        if (tab.dataset.tab === 'overview') { updateTrendChart(); updateGradeChart(); updateGradeCountTable(); updateDimAvgChart(); }
        if (tab.dataset.tab === 'compare') { updateCompareFilters(); updateRadarChart(); updateHeatmapChart(); }
        if (tab.dataset.tab === 'pool') { renderSupplierPool(); }
        if (tab.dataset.tab === 'scoring') { renderScoringTable(); }
        // Force resize all chart instances after render
        setTimeout(() => {
          [trendChartInstance, gradeChartInstance, dimAvgChartInstance, radarChartInstance, heatmapChartInstance].forEach(c => {
            if (c) c.resize();
          });
        }, 50);
      }, 150);
    });
  });
  
  // Stats month selector
  document.getElementById('statsMonth').addEventListener('change', updateStats);
  
  // Filter changes
  // trendCategory and trendMetric are now multi-select dropdowns, handled by their own click handlers
  document.getElementById('compareCategory').addEventListener('change', () => { updateCompareSuppliers(); updateRadarChart(); updateHeatmapChart(); });
  document.getElementById('rankMonth1').addEventListener('change', updateRankTable);
  document.getElementById('rankMonth2').addEventListener('change', updateRankTable);
  document.getElementById('rankGrade').addEventListener('change', updateRankTable);
  document.getElementById('rankSearch').addEventListener('input', updateRankTable);
  document.getElementById('detailMonth').addEventListener('change', updateDetailTable);
  document.getElementById('detailGrade').addEventListener('change', updateDetailTable);
  document.getElementById('detailSearch').addEventListener('input', updateDetailTable);
  
  // Window resize - debounced for performance
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      [trendChartInstance, gradeChartInstance, dimAvgChartInstance, radarChartInstance, heatmapChartInstance].forEach(c => {
        if (c) c.resize();
      });
      // Re-render charts with dynamic sizing
      const comparePanel = document.getElementById('panel-compare');
      if (comparePanel.classList.contains('active')) {
        updateRadarChart();
        updateHeatmapChart();
      }
    }, 200);
  });
}

function handleFiles(files) {
  if (!files || files.length === 0) return;
  
  showLoading(true);
  let processed = 0;
  const total = files.length;
  
  Array.from(files).forEach(file => {
    parseMonthExcel(file, (err, result) => {
      processed++;
      if (err) {
        showNotification(`解析 ${file.name} 失败: ${err.message}`, 'error');
      } else if (result && result.data.length > 0) {
        addMonth(result);
        showNotification(`✅ ${result.name}数据已加载（${result.data.length}家供应商）`, 'success');
      } else {
        showNotification(`未能从 ${file.name} 中解析到数据`, 'error');
      }
      
      if (processed === total) {
        showLoading(false);
      }
    });
  });
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

function showNotification(msg, type) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}
