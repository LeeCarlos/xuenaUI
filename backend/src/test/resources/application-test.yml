server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xuena.supplier.domain.entity

jwt:
  secret: test-jwt-secret-key-1234567890-abcdefghijklmnopqrstuvwxyz
  expire: 3600000
  refresh-expire: 604800000

logging:
  level:
    com.xuena.supplier: DEBUG
    org.mybatis: DEBUG