server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xuena.supplier.entity

jwt:
  secret: test-jwt-secret-key
  expire: 3600000
  refresh-expire: 604800000

logging:
  level:
    com.xuena.supplier: DEBUG
    org.mybatis: DEBUG